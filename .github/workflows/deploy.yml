name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install nuekit
        run: bun install -g nuekit

      - name: Build site
        run: nue build

      - name: Fix paths for GitHub Pages subdirectory
        run: |
          cd .dist
          # Fix absolute paths in HTML files to include /zenixos.org prefix
          find . -name "*.html" -exec sed -i 's|href="/|href="/zenixos.org/|g' {} \;
          find . -name "*.html" -exec sed -i 's|src="/|src="/zenixos.org/|g' {} \;
          # Fix import maps and other JSON-like paths
          find . -name "*.html" -exec sed -i 's|":"/@|":"/zenixos.org/@|g' {} \;
          find . -name "*.html" -exec sed -i 's|":"/admin|":"/zenixos.org/admin|g' {} \;

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
