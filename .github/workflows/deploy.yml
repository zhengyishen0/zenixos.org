name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  # Set to empty string "" when using custom domain, or "/zenixos.org" for GitHub Pages subdirectory
  BASE_PATH: ""

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install nuekit
        run: bun install -g nuekit

      - name: Build site
        run: nue build

      - name: Fix paths for GitHub Pages subdirectory
        if: env.BASE_PATH != ''
        run: |
          cd .dist
          find . -name "*.html" -exec sed -i 's|href="/|href="${{ env.BASE_PATH }}/|g' {} \;
          find . -name "*.html" -exec sed -i 's|src="/|src="${{ env.BASE_PATH }}/|g' {} \;
          find . -name "*.html" -exec sed -i 's|":"/@|":"${{ env.BASE_PATH }}/@|g' {} \;
          find . -name "*.html" -exec sed -i 's|":"/admin|":"${{ env.BASE_PATH }}/admin|g' {} \;

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
