<!doctype html+dhtml lib>

<!--
  Used on server layouts and in client app
-->

<time :is="pretty-date">
  { pretty }

  <script>
    const DATE_FORMAT = new Intl.DateTimeFormat('en-US', {
      month: 'short', day: 'numeric', year: 'numeric'
    })
    let date = this.date || new Date()
    if (typeof date == 'string') date = new Date(date)
    this.pretty = DATE_FORMAT.format(date)
  </script>
</time>

<!-- Essay entries list component -->
<div :is="essay-entries" class="essay-entries">
  <a :each="page in essay" href="{ page.url }" class="essay-entry">
    <time><pretty-date :date="page.date"/></time>
    <div>
      <strong>{ page.title }</strong>
      <p>{{ markdown(page.description) }}</p>
    </div>
  </a>
</div>
