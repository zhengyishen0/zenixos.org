<svg width="100%" viewBox="0 0 680 310" xmlns="http://www.w3.org/2000/svg">
<rect x="0" y="0" width="680" height="300" fill="#0a0a0a" rx="12"/>

<text x="170" y="36" text-anchor="middle" font-family="var(--font-sans)" font-size="14" font-weight="500" fill="#666">Traditional Computing</text>
<text x="510" y="36" text-anchor="middle" font-family="var(--font-sans)" font-size="14" font-weight="500" fill="#ccc">Agentic System</text>

<!-- Traditional side -->
<rect x="70" y="56" width="200" height="48" rx="8" fill="none" stroke="#444" stroke-width="0.5"/>
<text x="170" y="80" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans)" font-size="13" fill="#666">Applications</text>

<rect x="70" y="116" width="200" height="48" rx="8" fill="none" stroke="#444" stroke-width="0.5"/>
<text x="170" y="140" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans)" font-size="13" fill="#666">Operating System</text>

<rect x="70" y="176" width="200" height="48" rx="8" fill="none" stroke="#444" stroke-width="0.5"/>
<text x="170" y="200" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans)" font-size="13" fill="#666">Kernel</text>

<rect x="70" y="236" width="200" height="48" rx="8" fill="none" stroke="#444" stroke-width="0.5"/>
<text x="170" y="260" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans)" font-size="13" fill="#555">Processor</text>

<!-- Agentic side -->
<rect x="410" y="56" width="200" height="48" rx="8" fill="#fff" fill-opacity="0.08" stroke="#888" stroke-width="0.5"/>
<text x="510" y="80" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans)" font-size="13" font-weight="500" fill="#eee">Capabilities</text>

<rect x="410" y="116" width="200" height="48" rx="8" fill="#fff" fill-opacity="0.06" stroke="#777" stroke-width="0.5"/>
<text x="510" y="140" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans)" font-size="13" font-weight="500" fill="#ddd">OS for Intelligence</text>

<rect x="410" y="176" width="200" height="48" rx="8" fill="#fff" fill-opacity="0.04" stroke="#666" stroke-width="0.5"/>
<text x="510" y="200" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans)" font-size="13" font-weight="500" fill="#bbb">Agent Framework</text>

<rect x="410" y="236" width="200" height="48" rx="8" fill="#fff" fill-opacity="0.03" stroke="#555" stroke-width="0.5"/>
<text x="510" y="260" text-anchor="middle" dominant-baseline="central" font-family="var(--font-sans)" font-size="13" font-weight="500" fill="#999">LLM</text>

<!-- Connecting lines -->
<line x1="290" y1="80" x2="390" y2="80" stroke="#333" stroke-width="0.5" stroke-dasharray="4 4"/>
<line x1="290" y1="140" x2="390" y2="140" stroke="#333" stroke-width="0.5" stroke-dasharray="4 4"/>
<line x1="290" y1="200" x2="390" y2="200" stroke="#333" stroke-width="0.5" stroke-dasharray="4 4"/>
<line x1="290" y1="260" x2="390" y2="260" stroke="#333" stroke-width="0.5" stroke-dasharray="4 4"/>
</svg>